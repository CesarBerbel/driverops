name: driverops

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-driverops}
      POSTGRES_USER: ${POSTGRES_USER:-driverops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-driverops}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-driverops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    # Nome explícito para o serviço de cron reaproveitar a mesma imagem.
    image: driverops-backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  # Agendador dos avisos da Central de Notificações baseados em data (OS
  # vencendo/atrasada, pagamentos, estoque etc.). Reaproveita a imagem do
  # backend, mas troca o entrypoint para NÃO subir o servidor nem rodar
  # migrations -- apenas espera o banco e chama o comando em loop. O comando é
  # idempotente (deduplicação por chave), então repetir de hora em hora é
  # seguro. Ajuste o intervalo com NOTIFICATIONS_SYNC_INTERVAL (segundos).
  notifications-cron:
    image: driverops-backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts:ro
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    entrypoint: ["bash", "-c"]
    command:
      - |
        bash /app/scripts/wait-for-postgres.sh
        # Dá um tempo para o backend concluir as migrations no primeiro boot.
        sleep 20
        while true; do
          python manage.py sync_notifications || true
          sleep "$${NOTIFICATIONS_SYNC_INTERVAL:-3600}"
        done
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
