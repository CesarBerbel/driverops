# Variante HTTP-only do reverse proxy (para ambientes que ainda NÃO têm TLS).
# Mantém a mídia PRIVADA (via backend + X-Accel-Redirect), mas sem HTTPS.
# Prefira o nginx/prod.conf (TLS) assim que tiver certificados. Aponte o
# docker-compose.prod.yml para este arquivo apenas provisoriamente.

upstream backend {
    server backend:8000;
}

client_max_body_size 12m;

# Rate limiting de borda por IP (ver nginx/prod.conf para detalhes).
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
limit_req_status 429;
limit_conn_status 429;

server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # CSP igual à variante TLS (sem HSTS, que exige HTTPS). Ver nginx/prod.conf.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; frame-src https://www.google.com https://maps.google.com; form-action 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://viacep.com.br" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }
    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /internal-media/ {
        internal;
        alias /app/media/;
        access_log off;
        expires 7d;
    }
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        limit_conn conn_limit 40;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /admin/ {
        limit_req zone=api_limit burst=60 nodelay;
        limit_conn conn_limit 40;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
