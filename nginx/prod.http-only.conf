# Variante HTTP-only do reverse proxy (para ambientes que ainda NÃO têm TLS).
# Mantém a mídia PRIVADA (via backend + X-Accel-Redirect), mas sem HTTPS.
# Prefira o nginx/prod.conf (TLS) assim que tiver certificados. Aponte o
# docker-compose.prod.yml para este arquivo apenas provisoriamente.

upstream backend {
    server backend:8000;
}

client_max_body_size 12m;

server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }
    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /internal-media/ {
        internal;
        alias /app/media/;
        access_log off;
        expires 7d;
    }
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
