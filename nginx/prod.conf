# Reverse proxy de produção do DriverOps.
# - serve o SPA (build do frontend) e os estáticos do backend;
# - a MÍDIA (uploads) é privada: /media/ vai ao backend, que autentica e devolve
#   X-Accel-Redirect para a location interna /internal-media/ (nunca exposta);
# - faz proxy de /api e /admin para o gunicorn (serviço "backend");
# - TLS obrigatório: HTTP 80 só faz ACME + redirect 301 para HTTPS.
#
# Requer certificados montados em /etc/nginx/certs/{fullchain,privkey}.pem
# (ver docs/production.md). Sem TLS ainda? Use nginx/prod.http-only.conf.

upstream backend {
    server backend:8000;
}

# Limite de corpo acima do teto da aplicação (10 MB) para uploads.
client_max_body_size 12m;

# Rate limiting de borda (por IP): protege a API/admin de abuso/DoS antes de
# chegar ao gunicorn. Complementa o throttle do DRF (que cobre poucas rotas).
# 30 req/s com rajada de 60 é folgado para uso normal (um page load faz poucas
# chamadas) mas corta varreduras. Zonas ficam no contexto http (conf.d/*).
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
limit_req_status 429;
limit_conn_status 429;

# --- HTTP: apenas ACME e redirect para HTTPS ---
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: a aplicação ---
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # TLS moderno apenas (1.2/1.3); sem protocolos/ciphers legados.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS (1 ano, subdomínios). O Django também envia; reforçado aqui na borda.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # Content-Security-Policy: bloqueia injeção de recursos de terceiros. A SPA
    # é servida da mesma origem (script-src 'self'); estilos inline são exigidos
    # pelo Radix/React ('unsafe-inline'); connect-src libera a busca de CEP
    # (viacep) e frame-src o mapa embutido do Google na landing.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; frame-src https://www.google.com https://maps.google.com; form-action 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://viacep.com.br" always;
    # Nega por padrão APIs sensíveis do navegador que o app não usa.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # --- Estáticos públicos (admin/DRF) ---
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }

    # --- Mídia PRIVADA: passa pelo backend (autenticação) ---
    location /media/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Location interna: só acessível via X-Accel-Redirect do backend.
    location /internal-media/ {
        internal;
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    # --- API e admin -> gunicorn (com rate limiting por IP) ---
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        limit_conn conn_limit 40;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /admin/ {
        limit_req zone=api_limit burst=60 nodelay;
        limit_conn conn_limit 40;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA (fallback para o index.html) ---
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
