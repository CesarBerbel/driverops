# Reverse proxy de produção do DriverOps.
# - serve o SPA (build do frontend) e os estáticos/mídia do backend;
# - faz proxy de /api e /admin para o gunicorn (serviço "backend").
# TLS: descomente o bloco 443 e monte os certificados (ver docs/production.md).

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 5m;

    # --- Estáticos e mídia (volumes compartilhados com o backend) ---
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 30d;
    }
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    # --- API e admin -> gunicorn ---
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA (fallback para o index.html) ---
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

