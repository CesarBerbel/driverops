name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR so we never burn minutes on
# stale commits once a newer push has landed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Only run backend/frontend jobs when their part of the tree actually
  # changed -- a docs-only or frontend-only PR never pays for a backend run
  # (and Postgres service container) and vice versa.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'scripts/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: driverops
          POSTGRES_USER: driverops
          POSTGRES_PASSWORD: driverops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U driverops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DJANGO_ENV: dev
      DJANGO_SECRET_KEY: ci-secret-key
      POSTGRES_DB: driverops
      POSTGRES_USER: driverops
      POSTGRES_PASSWORD: driverops
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      EMAIL_HOST: localhost
      EMAIL_PORT: 1025
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Migrate
        run: python manage.py migrate --noinput

      - name: Test (pytest)
        run: pytest -q

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b

      - name: Test (vitest)
        run: npm run test -- --run

      - name: Build
        run: npm run build

  # Single required-status-check target: green regardless of which of the
  # two jobs above actually ran, so branch protection doesn't need to know
  # about path-filtering skips.
  ci:
    needs: [changes, backend, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify no failures
        run: |
          if [ "${{ needs.backend.result }}" = "failure" ] || [ "${{ needs.frontend.result }}" = "failure" ]; then
            echo "One or more jobs failed."
            exit 1
          fi
          echo "OK"
