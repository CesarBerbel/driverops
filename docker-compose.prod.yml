# Stack de PRODUÇÃO do DriverOps. Complementa (não substitui) o
# docker-compose.yml de desenvolvimento. Uso:
#
#   cp .env.example .env.prod   # e ajuste com valores REAIS de produção
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Pré-requisitos de produção (ver docs/production.md):
#   - DJANGO_ENV=prod e DJANGO_SECRET_KEY forte (o boot falha sem ele);
#   - TLS: forneça certificados e habilite o bloco 443 em nginx/prod.conf;
#   - e-mail SMTP real (não Mailpit).
name: driverops-prod

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Sem porta exposta ao host: o banco só é acessível na rede interna.

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
    image: driverops-backend-prod
    env_file:
      - .env.prod
    environment:
      DJANGO_ENV: prod
    volumes:
      - static:/app/staticfiles
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  notifications-cron:
    image: driverops-backend-prod
    env_file:
      - .env.prod
    environment:
      DJANGO_ENV: prod
    entrypoint: ["bash", "-c"]
    command:
      - |
        bash /app/scripts/wait-for-postgres.sh
        sleep 20
        while true; do
          python manage.py sync_notifications || true
          sleep "$${NOTIFICATIONS_SYNC_INTERVAL:-3600}"
        done
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: /api
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/app/staticfiles:ro
      - media:/app/media:ro
      # TLS: monte seus certificados e habilite o bloco 443 em nginx/prod.conf.
      # - ./nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      # - "443:443"
    depends_on:
      - backend
    restart: unless-stopped

  db-backup:
    image: postgres:16-alpine
    env_file:
      - .env.prod
    volumes:
      - backups:/backups
    entrypoint: ["sh", "-c"]
    command:
      - |
        while true; do
          ts=$$(date +%Y%m%d-%H%M%S)
          if PGPASSWORD="$$POSTGRES_PASSWORD" pg_dump -h db -U "$$POSTGRES_USER" "$$POSTGRES_DB" | gzip > "/backups/driverops-$$ts.sql.gz"; then
            echo "backup ok: driverops-$$ts.sql.gz"
          else
            echo "backup FALHOU em $$ts"
          fi
          # Retém os 14 backups mais recentes.
          ls -1t /backups/driverops-*.sql.gz 2>/dev/null | tail -n +15 | xargs -r rm -f
          sleep "$${BACKUP_INTERVAL:-86400}"
        done
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  static:
  media:
  backups:
