# Stack de PRODUÇÃO do DriverOps. Complementa (não substitui) o
# docker-compose.yml de desenvolvimento. Uso:
#
#   cp .env.example .env.prod   # e ajuste com valores REAIS de produção
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Pré-requisitos de produção (ver docs/production.md):
#   - DJANGO_ENV=prod e DJANGO_SECRET_KEY forte (o boot falha sem ele);
#   - TLS: forneça certificados e habilite o bloco 443 em nginx/prod.conf;
#   - e-mail SMTP real (não Mailpit).
name: driverops-prod

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Sem porta exposta ao host: o banco só é acessível na rede interna.

  # Init one-shot: aplica migrations e collectstatic UMA vez, antes das réplicas
  # de app subirem. Separa a migração do boot dos containers de app -- assim
  # escalar `backend` não faz N réplicas correrem `migrate` em paralelo.
  backend-migrate:
    image: driverops-backend-prod
    env_file:
      - .env.prod
    environment:
      DJANGO_ENV: prod
    volumes:
      - static:/app/staticfiles
      - media:/app/media
    entrypoint: ["bash", "-c"]
    command:
      - |
        bash /app/scripts/wait-for-postgres.sh
        python manage.py migrate --noinput
        python manage.py collectstatic --noinput
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
    image: driverops-backend-prod
    env_file:
      - .env.prod
    environment:
      DJANGO_ENV: prod
      # As migrations/collectstatic são feitas pelo backend-migrate; as réplicas
      # de app não repetem (evita corrida ao escalar).
      RUN_MIGRATIONS: "0"
    volumes:
      - static:/app/staticfiles
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')\" || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  notifications-cron:
    image: driverops-backend-prod
    env_file:
      - .env.prod
    environment:
      DJANGO_ENV: prod
    entrypoint: ["bash", "-c"]
    command:
      - |
        bash /app/scripts/wait-for-postgres.sh
        sleep 20
        while true; do
          echo "[cron] ciclo iniciado em $$(date -u +%FT%TZ)"
          python manage.py sync_notifications || echo "[cron] sync_notifications FALHOU"
          python manage.py sync_crm || echo "[cron] sync_crm FALHOU"
          # Heartbeat para o healthcheck detectar um cron travado.
          date +%s > /tmp/cron-heartbeat
          echo "[cron] ciclo concluido; proximo em $${NOTIFICATIONS_SYNC_INTERVAL:-3600}s"
          sleep "$${NOTIFICATIONS_SYNC_INTERVAL:-3600}"
        done
    healthcheck:
      # Saudável se o heartbeat foi atualizado há menos de ~2h30 (cobre o
      # intervalo padrão de 1h + margem). Detecta um cron parado/travado.
      test:
        - "CMD-SHELL"
        - "test -f /tmp/cron-heartbeat && [ $$(( $$(date +%s) - $$(cat /tmp/cron-heartbeat) )) -lt 9000 ]"
      interval: 300s
      timeout: 5s
      retries: 3
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: /api
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/app/staticfiles:ro
      - media:/app/media:ro
      # TLS obrigatório: monte os certificados em ./nginx/certs (fullchain.pem +
      # privkey.pem). Sem TLS ainda? Troque prod.conf por prod.http-only.conf.
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "pidof nginx || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  db-backup:
    image: postgres:16-alpine
    env_file:
      - .env.prod
    volumes:
      - backups:/backups
      # Mídia (uploads) montada só-leitura para entrar no backup também.
      - media:/app/media:ro
      # Scripts de backup/restauração (backup.sh / restore-test.sh).
      - ./scripts:/app/scripts:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        # aws-cli só é instalado se o envio externo (S3) estiver configurado.
        if [ -n "$${BACKUP_S3_BUCKET:-}" ]; then
          apk add --no-cache aws-cli >/dev/null 2>&1 || echo "aviso: falha ao instalar aws-cli"
        fi
        while true; do
          sh /app/scripts/backup.sh
          sleep "$${BACKUP_INTERVAL:-86400}"
        done
    healthcheck:
      # Considera saudável enquanto existir pelo menos um dump recente (< 2 dias
      # para o intervalo padrão diário). Detecta backup parado.
      test:
        - "CMD-SHELL"
        - "test -n \"$$(find /backups -name 'driverops-*.sql.gz' -mmin -2880 2>/dev/null)\""
      interval: 300s
      timeout: 5s
      retries: 3
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  static:
  media:
  backups:
